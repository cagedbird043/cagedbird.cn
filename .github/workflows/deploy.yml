name: Deploy Hexo

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "blog-deploy"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Hexo site
        run: |
          npx hexo generate

      - name: Upload Pages fallback artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./redirects

      - name: Install SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.REMOTE_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to hk-edge
        env:
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
        run: |
          release="/srv/cagedbird/blog.releases/${GITHUB_SHA}"
          ssh -i ~/.ssh/deploy_key "$REMOTE_USER@$REMOTE_HOST" "rm -rf '$release' && mkdir -p '$release'"
          test -s public/index.html
          rsync -az --delete -e "ssh -i ~/.ssh/deploy_key" public/ "$REMOTE_USER@$REMOTE_HOST:$release/"
          ssh -i ~/.ssh/deploy_key "$REMOTE_USER@$REMOTE_HOST" "set -e; test -s '$release/index.html'; ln -sfnT '$release' /srv/cagedbird/blog; find /srv/cagedbird/blog.releases -mindepth 1 -maxdepth 1 -type d -printf '%T@ %p\n' | sort -n | head -n -5 | cut -d' ' -f2- | xargs -r rm -rf"

  pages-fallback:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy fallback redirect to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
