name: Deploy Hexo

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "blog-deploy"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Hexo site
        run: |
          npx hexo generate

      - name: Upload Pages fallback artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./redirects

      - name: Install SSH key
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.REMOTE_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to hk-edge
        env:
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
        run: |
          test -s public/index.html
          ssh -i ~/.ssh/deploy_key "$REMOTE_USER@$REMOTE_HOST" "mkdir -p /srv/cagedbird/blog"
          rsync -rvzP --delete -e "ssh -i ~/.ssh/deploy_key" public/ "$REMOTE_USER@$REMOTE_HOST:/srv/cagedbird/blog/"
          ssh -i ~/.ssh/deploy_key "$REMOTE_USER@$REMOTE_HOST" "test -s /srv/cagedbird/blog/index.html"

  pages-fallback:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy fallback redirect to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
